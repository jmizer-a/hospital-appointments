stages:
  - test-manual
  - test-docker
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"

test-manual:
  when: manual
  stage: test-manual
  image: maven:3.9.9-eclipse-temurin-21
  before_script:
    - apt-get update -qy
    - apt-get install -y nodejs npm
  script:
    - cd backend
    - mvn $MAVEN_CLI_OPTS clean test
    - cd ../frontend
    - npm install
    - npm run build
    - npm run test --if-present
  artifacts:
    paths:
      - backend/target/
      - frontend/dist/

test-docker:
  when: manual
  stage: test-docker
  image: docker:24
  services:
    - name: docker:24-dind
      command: ["--host=tcp://0.0.0.0:2375", "--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
    COMPOSE_DOCKER_CLI_BUILD: "1"
    DOCKER_DEFAULT_PLATFORM: linux/amd64
  before_script:
    - docker --version
    - docker compose version
    - docker login container-registry.oracle.com -u $ORACLE_EMAIL -p $ORACLE_PASSWORD
  script:
    - docker compose build --parallel --pull
    - docker compose up -d --wait --wait-timeout 240
    # - docker compose exec backend ./mvnw -B -ntp test
  after_script:
    - docker compose down -v


deploy:
  stage: deploy
  when: manual
  only:
    - main
  script:
    - echo "Deploy step goes here"
